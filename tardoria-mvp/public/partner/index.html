<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TardoriaSales — Painel do Parceiro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#e76f51;--text:#e6edf3;--muted:#8b949e;--green:#52b788;--blue:#79c0ff;--gold:#f4d03f}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
header .logo{color:var(--accent);font-size:18px;font-weight:900;letter-spacing:4px}
header .logo span{color:var(--muted);font-size:12px;font-weight:400}
#logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px}
#logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* AUTH */
#auth-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:12px;padding:20px}
#auth-panel h2{color:var(--accent);font-size:22px;letter-spacing:4px;margin-bottom:8px}
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px;width:min(360px,95vw);display:flex;flex-direction:column;gap:10px}
.form-box label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
.form-box input{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px}
.form-box input:focus{outline:none;border-color:var(--accent)}
.btn-primary{padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:.2s}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;border:none;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;margin-top:4px}
.err{color:#f85149;font-size:11px;min-height:14px}

/* DASHBOARD */
#dashboard{display:none;padding:24px;max-width:960px;margin:0 auto}
.section-title{color:var(--muted);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.stat-card .num{font-size:28px;font-weight:900;color:var(--accent)}
.stat-card .lbl{color:var(--muted);font-size:11px;margin-top:2px}

/* QR BOX */
.qr-box{background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:24px;display:flex;gap:24px;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap}
.qr-box img{width:160px;height:160px;border-radius:8px;background:#000}
.qr-info h3{color:var(--accent);font-size:16px;letter-spacing:2px;margin-bottom:8px}
.qr-info p{color:var(--muted);font-size:12px;margin-bottom:10px;line-height:1.6}
.token-code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:12px;color:var(--blue);letter-spacing:1px;word-break:break-all}
.tv-link{color:var(--green);font-size:12px;margin-top:8px;display:block;text-decoration:none}

/* ITEMS */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;gap:12px;align-items:center}
.item-card.active{border-color:var(--accent)}
.item-icon{font-size:26px;width:36px;text-align:center;flex-shrink:0}
.item-name{font-size:13px;font-weight:700;margin-bottom:2px}
.item-desc{font-size:10px;color:var(--muted)}
.item-rarity{font-size:10px;margin-top:2px}
.rarity-comum{color:#adb5bd}.rarity-incomum{color:var(--green)}.rarity-raro{color:var(--blue)}.rarity-lendario{color:var(--accent)}
.item-controls{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.item-controls input[type=number]{width:70px;padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--gold);font-family:inherit;font-size:12px;text-align:center}
.toggle-btn{padding:4px 10px;border-radius:4px;border:1px solid;font-family:inherit;font-size:11px;cursor:pointer}
.toggle-on {background:#1a3a2a;border-color:var(--green);color:var(--green)}
.toggle-off{background:#1c1517;border-color:var(--border);color:var(--muted)}

/* RESPONSIVE */
@media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}.qr-box{flex-direction:column;align-items:center;text-align:center}}
</style>
</head>
<body>

<header>
  <div class="logo">⚔ TardoriaSales <span>— Painel do Parceiro</span></div>
  <button id="logout-btn" style="display:none" onclick="logout()">Sair</button>
</header>

<!-- AUTH -->
<div id="auth-panel">
  <h2>PARCEIRO</h2>
  <div class="form-box" id="login-form">
    <label>EMAIL</label>
    <input id="p-email" type="email" placeholder="seu@email.com"/>
    <label>SENHA</label>
    <input id="p-pass"  type="password" placeholder="••••••••"/>
    <span class="err" id="p-err"></span>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <button class="btn-ghost" onclick="showRegister()">Não tem conta? Registrar</button>
  </div>

  <div class="form-box" id="register-form" style="display:none">
    <label>NOME DO ESTABELECIMENTO</label>
    <input id="r-name"  type="text" placeholder="Bar do Dragão"/>
    <label>EMAIL</label>
    <input id="r-email" type="email" placeholder="contato@bar.com"/>
    <label>SENHA</label>
    <input id="r-pass"  type="password" placeholder="mínimo 8 caracteres"/>
    <label>ENDEREÇO (opcional)</label>
    <input id="r-addr"  type="text" placeholder="Rua, número, cidade"/>
    <span class="err" id="r-err"></span>
    <button class="btn-primary" onclick="doRegister()">Cadastrar</button>
    <button class="btn-ghost" onclick="showLogin()">Já tem conta? Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <!-- Stats -->
  <p class="section-title">📊 Visitas</p>
  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="stat-today">—</div><div class="lbl">Hoje</div></div>
    <div class="stat-card"><div class="num" id="stat-total">—</div><div class="lbl">Total</div></div>
    <div class="stat-card"><div class="num" id="stat-peak">—</div><div class="lbl">Hora de pico</div></div>
  </div>

  <!-- QR -->
  <p class="section-title">📱 QR Code do dia</p>
  <div class="qr-box">
    <img id="qr-img" src="" alt="QR Code"/>
    <div class="qr-info">
      <h3 id="partner-name">—</h3>
      <p>Este QR expira à meia-noite. Exiba-o no balcão ou na tela.<br>
         O jogador escaneia, valida GPS e tem acesso à sua loja.</p>
      <div class="token-code" id="qr-token">—</div>
      <a id="tv-link" class="tv-link" target="_blank">📺 Abrir Tela Pública →</a>
      <div style="margin-top:10px">
        <button class="btn-primary" style="padding:7px 16px;font-size:11px" onclick="printQR()">🖨 Imprimir QR</button>
      </div>
    </div>
  </div>

  <!-- Items -->
  <p class="section-title">🛒 Itens da loja</p>
  <div class="items-grid" id="items-grid"></div>
</div>

<script>
let pToken   = localStorage.getItem('ps_token');
let pData    = null;
let catalog  = [];

// ── AUTH ──────────────────────────────────────────────────
function showRegister() {
  document.getElementById('login-form').style.display    = 'none';
  document.getElementById('register-form').style.display = '';
}
function showLogin() {
  document.getElementById('register-form').style.display = 'none';
  document.getElementById('login-form').style.display    = '';
}

async function doLogin() {
  const email    = document.getElementById('p-email').value.trim();
  const password = document.getElementById('p-pass').value;
  const r = await api('/api/partner/login', { email, password });
  if (!r.ok) { document.getElementById('p-err').textContent = r.data.error; return; }
  pToken = r.data.token;
  pData  = r.data.partner;
  localStorage.setItem('ps_token', pToken);
  openDashboard();
}

async function doRegister() {
  const body = {
    establishmentName: document.getElementById('r-name').value.trim(),
    email:    document.getElementById('r-email').value.trim(),
    password: document.getElementById('r-pass').value,
    address:  document.getElementById('r-addr').value.trim(),
  };
  // Tenta capturar GPS do estabelecimento
  try {
    const pos = await new Promise((res,rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {timeout:5000})
    );
    body.lat = pos.coords.latitude;
    body.lng = pos.coords.longitude;
  } catch {}

  const r = await api('/api/partner/register', body);
  if (!r.ok) { document.getElementById('r-err').textContent = r.data.error; return; }
  pToken = r.data.token;
  pData  = r.data.partner;
  localStorage.setItem('ps_token', pToken);
  openDashboard();
}

function logout() {
  localStorage.removeItem('ps_token');
  pToken = null; pData = null;
  document.getElementById('dashboard').style.display   = 'none';
  document.getElementById('auth-panel').style.display  = 'flex';
  document.getElementById('logout-btn').style.display  = 'none';
}

// ── DASHBOARD ─────────────────────────────────────────────
async function openDashboard() {
  document.getElementById('auth-panel').style.display  = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  document.getElementById('logout-btn').style.display  = '';

  // Me
  const me = await api('/api/partner/me');
  if (me.ok) {
    pData = me.data.partner;
    document.getElementById('partner-name').textContent = pData.establishment_name;
  }

  // QR
  loadQR();

  // Stats
  loadStats();

  // Items
  loadItems();
}

async function loadQR() {
  const r = await api('/api/partner/qr');
  if (!r.ok) return;
  document.getElementById('qr-img').src   = r.data.qrImg;
  document.getElementById('qr-token').textContent = r.data.token;
  const tvUrl = `${location.origin}/tv/${pData?.tv_code || ''}`;
  document.getElementById('tv-link').href  = tvUrl;
  document.getElementById('tv-link').textContent = `📺 Tela pública → ${tvUrl}`;
}

async function loadStats() {
  const r = await api('/api/partner/stats');
  if (!r.ok) return;
  const { todayVisits, totalVisits, peakHour } = r.data;
  document.getElementById('stat-today').textContent = todayVisits;
  document.getElementById('stat-total').textContent = totalVisits;
  document.getElementById('stat-peak').textContent  = peakHour !== null ? `${peakHour}h` : '—';
}

async function loadItems() {
  const r = await api('/api/partner/items');
  if (!r.ok) return;
  catalog = r.data.catalog;
  renderItems();
}

function renderItems() {
  const grid = document.getElementById('items-grid');
  grid.innerHTML = '';
  catalog.forEach(item => {
    const card = document.createElement('div');
    card.className = `item-card ${item.enabled ? 'active' : ''}`;
    card.innerHTML = `
      <div class="item-icon">${item.icon}</div>
      <div>
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-rarity rarity-${item.rarity}">${item.rarity}</div>
      </div>
      <div class="item-controls">
        <label style="color:var(--muted);font-size:10px">gold</label>
        <input type="number" value="${item.price_gold}" min="1" onchange="updatePrice('${item.key}',this.value)" style="width:60px"/>
        <button class="toggle-btn ${item.enabled?'toggle-on':'toggle-off'}"
          onclick="toggleItem('${item.key}',${!item.enabled})">
          ${item.enabled ? '✅ Ativo' : '○ Inativo'}
        </button>
      </div>`;
    grid.appendChild(card);
  });
}

async function toggleItem(key, active) {
  const item = catalog.find(i => i.key === key);
  if (!item) return;
  const r = await api('/api/partner/items', { itemKey:key, priceGold:item.price_gold, active }, 'POST');
  if (r.ok) { item.enabled = active; renderItems(); }
}

async function updatePrice(key, price) {
  const item = catalog.find(i => i.key === key);
  if (!item) return;
  item.price_gold = parseInt(price) || 10;
  await api('/api/partner/items', { itemKey:key, priceGold:item.price_gold, active:item.enabled }, 'POST');
}

function printQR() {
  const img = document.getElementById('qr-img').src;
  const win = window.open('');
  win.document.write(`<html><body style="text-align:center;background:#0d1117;padding:40px">
    <p style="color:#e76f51;font-family:monospace;font-size:24px;letter-spacing:4px">⚔ TARDORIA</p>
    <p style="color:#8b949e;font-family:monospace;font-size:14px;margin:8px 0">${pData?.establishment_name || ''}</p>
    <img src="${img}" style="width:280px;height:280px;margin:20px 0"/>
    <p style="color:#52b788;font-family:monospace;font-size:13px">Escaneie para jogar e acessar ofertas exclusivas!</p>
    <p style="color:#8b949e;font-family:monospace;font-size:11px;margin-top:8px">QR válido por hoje</p>
  </body></html>`);
  win.print();
}

// ── API helper ────────────────────────────────────────────
async function api(path, body, method) {
  const opts = {
    method: method || (body ? 'POST' : 'GET'),
    headers: { 'Content-Type':'application/json', ...(pToken ? { Authorization:`Bearer ${pToken}` } : {}) },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(path, opts);
    const d = await r.json();
    return { ok:r.ok, data:d };
  } catch(e) { return { ok:false, data:{ error:e.message } }; }
}

// Auto-login
if (pToken) {
  api('/api/partner/me').then(r => {
    if (r.ok) { pData = r.data.partner; openDashboard(); }
    else { localStorage.removeItem('ps_token'); pToken = null; }
  });
}
</script>
</body>
</html>
